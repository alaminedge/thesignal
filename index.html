<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Signal — Smart Analysis & Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cabinet+Grotesk:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;--surface:#0b0f1a;--surface2:#111827;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#ff6b35;--accent2:#e55a2b;--accent-dim:rgba(255,107,53,0.08);
  --white:#f0f4f8;--gray:#7a8899;--gray2:#a0adb8;
  --radius:9px;--radius-lg:13px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

header{position:sticky;top:0;z-index:80;background:rgba(5,8,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px}
.hdr{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;text-decoration:none;color:var(--white)}
.hdr-logo em{font-style:italic;color:var(--accent)}
.hdr-tagline{font-size:.7rem;color:var(--gray);font-family:'DM Mono',monospace;letter-spacing:.08em}
.hdr-right{display:flex;gap:8px}
.hdr-btn{padding:6px 14px;border:1px solid var(--border2);color:var(--gray2);border-radius:20px;font-size:.72rem;text-decoration:none;transition:all .2s}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}

.hero{max-width:1200px;margin:0 auto;padding:32px 24px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;margin-bottom:24px}
.hero-title em{font-style:italic;color:var(--accent)}

.pinned-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px}
.pinned-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;transition:all .3s;text-decoration:none;color:var(--white);display:block}
.pinned-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 20px 60px rgba(255,107,53,0.15)}
.pinned-img{width:100%;height:220px;object-fit:cover;background:var(--surface2)}
.pinned-body{padding:20px}
.pinned-cat{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:8px}
.pinned-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px;line-height:1.3}
.pinned-excerpt{font-size:.82rem;color:var(--gray);line-height:1.5;margin-bottom:12px}
.pinned-meta{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gray);display:flex;gap:16px}

.section-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--accent);display:inline-block}

.articles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all .3s;text-decoration:none;color:var(--white);display:block}
.article-card:hover{transform:translateY(-4px);border-color:var(--accent-dim)}
.article-img{width:100%;height:160px;object-fit:cover;background:var(--surface2)}
.article-body{padding:16px}
.article-cat{font-family:'DM Mono',monospace;font-size:.56rem;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.article-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;margin-bottom:6px;line-height:1.3}
.article-excerpt{font-size:.74rem;color:var(--gray);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.article-meta{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--gray)}

.load-more{text-align:center;margin-bottom:60px}
.load-more-btn{padding:12px 32px;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:var(--radius);font-family:'Cabinet Grotesk',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s}
.load-more-btn:hover{background:var(--accent);color:#fff}

footer{background:var(--surface);border-top:1px solid var(--border);padding:32px 24px;text-align:center}
footer p{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--gray)}

@media(max-width:768px){
  .pinned-grid{grid-template-columns:1fr}
  .articles-grid{grid-template-columns:1fr}
  .hero-title{font-size:1.8rem}
  .hdr-tagline{display:none}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div>
      <a href="/" class="hdr-logo">The <em>Signal</em></a>
      <div class="hdr-tagline">Smart Analysis & Insights</div>
    </div>
    <div class="hdr-right">
      <a href="/signin.html" class="hdr-btn">Admin</a>
    </div>
  </div>
</header>

<div class="hero">
  <h1 class="hero-title">Today's <em>Analysis</em></h1>
  <div class="pinned-grid" id="pinnedGrid"></div>

  <h2 class="section-title">Latest Analysis</h2>
  <div class="articles-grid" id="articlesGrid"></div>

  <div class="load-more" id="loadMoreWrap">
    <button class="load-more-btn" onclick="loadMore()" id="loadMoreBtn">Load More Articles</button>
  </div>
</div>

<footer>
  <p>© 2024 The Signal · Smart Analysis & Insights</p>
</footer>

<script>
var currentPage = 1;
var hasMore = false;

async function loadHomepage(page) {
  var res = await fetch('/api/homepage?page=' + (page || 1));
  var data = await res.json();

  if (page === 1) {
    renderPinned(data.pinned || []);
  }

  renderArticles(data.latest || [], page > 1);
  hasMore = data.hasMore;
  currentPage = data.page;

  if (!hasMore) {
    document.getElementById('loadMoreWrap').style.display = 'none';
  } else {
    document.getElementById('loadMoreWrap').style.display = 'block';
  }
}

function renderPinned(pinned) {
  var html = '';
  pinned.forEach(function(a) {
    html += '<a href="/article.html?slug=' + a.slug + '" class="pinned-card">';
    if (a.image_url) html += '<img src="' + a.image_url + '" class="pinned-img" alt="" onerror="this.style.display=\'none\'">';
    html += '<div class="pinned-body">';
    html += '<div class="pinned-cat">📌 ' + (a.category_name || '') + (a.subcategory_name ? ' > ' + a.subcategory_name : '') + '</div>';
    html += '<h3 class="pinned-title">' + a.title + '</h3>';
    if (a.excerpt) html += '<p class="pinned-excerpt">' + a.excerpt + '</p>';
    html += '<div class="pinned-meta"><span>✍️ ' + (a.author || 'The Signal') + '</span><span>🕐 ' + new Date(a.published_at || a.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></div>';
    html += '</div></a>';
  });
  document.getElementById('pinnedGrid').innerHTML = html || '<p style="color:var(--gray);grid-column:1/-1">No featured articles</p>';
}

function renderArticles(articles, append) {
  var html = append ? document.getElementById('articlesGrid').innerHTML : '';
  articles.forEach(function(a) {
    html += '<a href="/article.html?slug=' + a.slug + '" class="article-card">';
    if (a.image_url) html += '<img src="' + a.image_url + '" class="article-img" alt="" onerror="this.style.display=\'none\'">';
    html += '<div class="article-body">';
    html += '<div class="article-cat">' + (a.category_name || '') + '</div>';
    html += '<h3 class="article-title">' + a.title + '</h3>';
    if (a.excerpt) html += '<p class="article-excerpt">' + a.excerpt + '</p>';
    html += '<div class="article-meta">✍️ ' + (a.author || 'The Signal') + ' · ' + new Date(a.published_at || a.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</div>';
    html += '</div></a>';
  });
  document.getElementById('articlesGrid').innerHTML = html;
}

function loadMore() {
  var btn = document.getElementById('loadMoreBtn');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  loadHomepage(currentPage + 1).then(function() {
    btn.textContent = 'Load More Articles';
    btn.disabled = false;
  });
}

loadHomepage(1);
</script>
</body>
</html>
