<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pacific Signal — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F4EE;--paper-w:#F0ECE2;--paper-d:#E8E2D4;
  --ink:#1A1814;--ink2:#2E2B24;--ink3:#5C5849;--ink4:#8C8878;--ink5:#B0AB9E;
  --rule:#DDD9CE;--rule2:#CAC5B8;
  --gold:#B49A5E;--gold-l:#D4BA82;
  --red:#7A1E1E;--red2:#5C1616;
  --white:#FFFFFF;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'Source Serif 4',Georgia,serif;
  --fm:'DM Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:var(--fb);
  background:var(--ink2);
  color:var(--ink);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  position:relative;overflow:hidden;
}

/* Subtle background texture */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,.012) 60px,rgba(255,255,255,.012) 61px),
    repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.012) 60px,rgba(255,255,255,.012) 61px);
  pointer-events:none;
}

/* Warm glow */
body::after{
  content:'';position:fixed;
  top:-10%;left:50%;transform:translateX(-50%);
  width:70vw;height:60vw;max-width:700px;max-height:600px;
  background:radial-gradient(ellipse,rgba(180,154,94,.07) 0%,transparent 65%);
  pointer-events:none;
}

/* CARD */
.card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  background:var(--paper);
  box-shadow:0 40px 100px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);
  animation:cardIn .5s cubic-bezier(.34,1.1,.64,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* Gold top rule */
.card-top-rule{height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}

.card-body{padding:40px 40px 34px}

/* Logo area */
.card-logo{text-align:center;margin-bottom:28px}
.logo-img-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;text-decoration:none}
.logo-img-wrap img{height:36px;width:auto}
.logo-name{font-family:var(--fd);font-size:1.3rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);line-height:1}
.logo-orn{display:flex;align-items:center;justify-content:center;gap:8px;margin:7px 0 6px}
.logo-orn-line{width:36px;height:1px;background:var(--rule2)}
.logo-orn-dia{width:4px;height:4px;background:var(--gold);transform:rotate(45deg)}
.logo-tag{font-family:var(--fb);font-size:.78rem;font-style:italic;color:var(--ink5)}

.card-divider{height:1px;background:var(--rule);margin-bottom:22px}

.card-subtitle{
  font-family:var(--fm);font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink5);text-align:center;margin-bottom:24px;
}

/* ALERT */
.alert{
  padding:10px 12px;margin-bottom:14px;display:none;
  font-family:var(--fm);font-size:.6rem;letter-spacing:.04em;
  border-left:3px solid var(--red);background:rgba(122,30,30,.07);color:var(--red);
}
.alert.on{display:block}

/* FORM */
.fg{margin-bottom:16px}
.flbl{
  display:block;font-family:var(--fm);font-size:.54rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px;
}
.finp{
  width:100%;padding:11px 13px;
  background:var(--white);
  border:1px solid var(--rule);border-bottom:2px solid var(--rule2);
  font-family:var(--fb);font-size:.95rem;color:var(--ink);
  outline:none;transition:all .2s;
}
.finp:focus{border-color:var(--ink3);border-bottom-color:var(--gold);box-shadow:0 1px 0 0 var(--gold)}
.finp::placeholder{color:var(--ink5);opacity:.6}

/* BUTTON */
.btn-signin{
  width:100%;margin-top:6px;padding:13px;
  background:var(--ink);color:var(--white);border:none;cursor:pointer;
  font-family:var(--fm);font-size:.6rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:background .2s;
}
.btn-signin:hover:not(:disabled){background:var(--ink2)}
.btn-signin:disabled{opacity:.5;cursor:not-allowed}
.spinner{
  width:13px;height:13px;border:1.5px solid rgba(255,255,255,.25);
  border-top-color:var(--white);border-radius:50%;
  animation:spin .65s linear infinite;display:none;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARD BOTTOM */
.card-foot{
  padding:13px 40px 16px;
  background:var(--paper-w);border-top:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.card-foot-link{
  font-family:var(--fm);font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink5);text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  transition:color .2s;
}
.card-foot-link:hover{color:var(--red)}
.card-secure{
  display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink5);
}
.card-secure svg{width:11px;height:11px;color:var(--ink5)}

@media(max-width:480px){
  .card-body{padding:30px 22px 26px}
  .card-foot{padding:11px 22px 13px;flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>

<div class="card">
  <div class="card-top-rule"></div>
  <div class="card-body">

    <div class="card-logo">
      <a href="/" class="logo-img-wrap">
        <img src="/images/tps.png" alt="The Pacific Signal">
        <span class="logo-name">The Pacific Signal</span>
      </a>
      <div class="logo-orn">
        <div class="logo-orn-line"></div>
        <div class="logo-orn-dia"></div>
        <div class="logo-orn-line"></div>
      </div>
      <div class="logo-tag">Beyond the Headlines</div>
    </div>

    <div class="card-divider"></div>
    <div class="card-subtitle">Editorial Administration</div>

    <div class="alert" id="alert"></div>

    <form onsubmit="return doLogin(event)">
      <div class="fg">
        <label class="flbl">Username</label>
        <input class="finp" type="text" id="uname" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="fg">
        <label class="flbl">Password</label>
        <input class="finp" type="password" id="pw" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-signin" id="loginBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnTxt">Sign In</span>
      </button>
    </form>

  </div>

  <div class="card-foot">
    <a href="/" class="card-foot-link">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>
      Back to site
    </a>
    <div class="card-secure">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Secure access
    </div>
  </div>
</div>

<script>
if(localStorage.getItem('pacific_signal_token')){window.location.href='/admin.html'}

async function doLogin(e){
  e.preventDefault();
  var u=document.getElementById('uname').value.trim();
  var p=document.getElementById('pw').value;
  var al=document.getElementById('alert');
  var btn=document.getElementById('loginBtn');
  var sp=document.getElementById('spinner');
  var bt=document.getElementById('btnTxt');

  al.className='alert';
  btn.disabled=true;sp.style.display='block';bt.textContent='Authenticating\u2026';

  try{
    var r=await fetch('/api/admin/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    });
    var d=await r.json();
    if(!r.ok){
      al.className='alert on';al.textContent=d.error||'Invalid credentials. Please try again.';
      btn.disabled=false;sp.style.display='none';bt.textContent='Sign In';
      return false;
    }
    localStorage.setItem('pacific_signal_token',d.token);
    localStorage.setItem('pacific_signal_admin',JSON.stringify(d.admin));
    bt.textContent='Access Granted\u2026';
    setTimeout(function(){window.location.href='/admin.html'},380);
  }catch(err){
    al.className='alert on';al.textContent='Network error. Please check your connection.';
    btn.disabled=false;sp.style.display='none';bt.textContent='Sign In';
  }
  return false;
}
</script>
</body>
</html>
