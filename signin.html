<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pacific Signal — Admin Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#FAFAF9;
  --surface:#FFFFFF;
  --border:rgba(0,0,0,0.06);
  --border2:rgba(0,0,0,0.1);
  --accent:#006994;
  --accent-dark:#004D6B;
  --text:#1A1A1A;
  --text-secondary:#4A4A4A;
  --text-muted:#6B6B6B;
  --white:#FFFFFF;
  --red:#C44536;
  --red-light:rgba(196,69,54,0.08);
  --radius:8px;
  --font-heading:'Playfair Display', Georgia, serif;
  --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:'DM Mono', monospace;
}

*,*::before,*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-card{
  width:100%;
  max-width:400px;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:12px;
  padding:44px 40px;
  box-shadow:0 4px 24px rgba(0,0,0,0.04);
}

.login-logo{
  text-align:center;
  margin-bottom:8px;
}

.login-logo h1{
  font-family:var(--font-heading);
  font-size:1.5rem;
  font-weight:700;
  color:var(--text);
  letter-spacing:0.5px;
}

.login-tagline{
  text-align:center;
  font-size:0.72rem;
  color:var(--text-muted);
  font-style:italic;
  margin-bottom:32px;
}

.login-subtitle{
  text-align:center;
  font-family:var(--font-mono);
  font-size:0.58rem;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:var(--text-muted);
  margin-bottom:24px;
}

.alert{
  padding:10px 14px;
  border-radius:var(--radius);
  font-size:0.78rem;
  margin-bottom:16px;
  display:none;
  line-height:1.4;
}

.alert.show{
  display:block;
}

.alert-error{
  background:var(--red-light);
  border:1px solid rgba(196,69,54,0.25);
  color:var(--red);
}

.form-group{
  margin-bottom:16px;
}

.form-label{
  display:block;
  font-family:var(--font-mono);
  font-size:0.6rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-muted);
  margin-bottom:6px;
  font-weight:500;
}

.form-input{
  width:100%;
  padding:11px 14px;
  background:var(--white);
  border:1.5px solid var(--border2);
  border-radius:var(--radius);
  font-family:var(--font-body);
  font-size:0.86rem;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s ease;
}

.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,105,148,0.06);
}

.form-input::placeholder{
  color:var(--text-muted);
  opacity:0.5;
}

.btn-signin{
  width:100%;
  padding:12px;
  background:var(--accent);
  color:var(--white);
  border:none;
  border-radius:var(--radius);
  font-family:var(--font-body);
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  letter-spacing:0.02em;
  transition:background 0.2s ease;
  margin-top:4px;
}

.btn-signin:hover{
  background:var(--accent-dark);
}

.btn-signin:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.spinner{
  display:inline-block;
  width:14px;
  height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:var(--white);
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  vertical-align:middle;
  margin-right:6px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <h1>The Pacific Signal</h1>
  </div>
  <div class="login-tagline">Beyond the Headlines</div>
  <div class="login-subtitle">Admin Panel</div>

  <div class="alert" id="alert"></div>

  <form onsubmit="return handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="admin" required autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-signin" id="loginBtn">Sign In</button>
  </form>
</div>

<script>
// Check if already logged in
var savedToken = localStorage.getItem('pacific_signal_token');
if (savedToken) {
  window.location.href = '/admin.html';
}

async function handleLogin(event) {
  event.preventDefault();

  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var alertEl = document.getElementById('alert');
  var btn = document.getElementById('loginBtn');

  alertEl.className = 'alert';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing In...';

  try {
    var response = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });

    var data = await response.json();

    if (!response.ok) {
      alertEl.className = 'alert alert-error show';
      alertEl.textContent = data.error || 'Invalid credentials. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return false;
    }

    // Save token and admin info
    localStorage.setItem('pacific_signal_token', data.token);
    localStorage.setItem('pacific_signal_admin', JSON.stringify(data.admin));

    // Redirect to admin panel
    window.location.href = '/admin.html';

  } catch (error) {
    alertEl.className = 'alert alert-error show';
    alertEl.textContent = 'Network error. Please check your connection.';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }

  return false;
}
</script>

</body>
</html>
